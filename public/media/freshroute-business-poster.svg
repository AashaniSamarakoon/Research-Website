<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1600" viewBox="0 0 1200 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="glow" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.35"/>
    </linearGradient>

    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(820 250) rotate(90) scale(260 360)">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="accentGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.0627  0 0 0 0 0.7255  0 0 0 0 0.5059  0 0 0 0.9 0" result="green"/>
      <feMerge>
        <feMergeNode in="green"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.00"/>
    </linearGradient>

    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.00"/>
    </linearGradient>

    <style>
      .t-title { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 900; }
      .t-sub   { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 700; letter-spacing: 4px; }
      .t-body  { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 600; }
      .t-small { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 600; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <rect width="1200" height="1600" fill="url(#grid)"/>
  <ellipse cx="820" cy="250" rx="420" ry="290" fill="url(#orb)"/>

  <!-- Header accent -->
  <rect x="90" y="120" width="1020" height="14" rx="7" fill="url(#glow)" opacity="0.95"/>

  <!-- Brand -->
  <text x="90" y="255" class="t-title" font-size="70" fill="#FFFFFF">FreshRoute</text>
  <text x="90" y="320" class="t-sub" font-size="26" fill="#A3A3A3">SMART FRUIT SUPPLY CHAIN</text>

  <!-- Hero card -->
  <g filter="url(#softShadow)">
    <rect x="90" y="370" width="1020" height="460" rx="28" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.14"/>

    <!-- Illustration area -->
    <clipPath id="heroClip">
      <rect x="110" y="395" width="980" height="300" rx="22"/>
    </clipPath>
    <g clip-path="url(#heroClip)">
      <rect x="110" y="395" width="980" height="300" fill="#020617" fill-opacity="0.35"/>

      <!-- Distant hills -->
      <path d="M110 570 C 230 520, 340 520, 470 570 C 610 625, 720 610, 860 560 C 980 515, 1040 520, 1090 545 L1090 695 L110 695 Z" fill="url(#hill2)"/>
      <!-- Near hills -->
      <path d="M110 610 C 260 545, 360 560, 510 630 C 660 705, 800 690, 930 620 C 1010 580, 1050 585, 1090 610 L1090 695 L110 695 Z" fill="url(#hill1)"/>

      <!-- Fruit icons -->
      <g opacity="0.95">
        <!-- apple -->
        <circle cx="220" cy="520" r="18" fill="#10B981"/>
        <path d="M220 498 C226 488, 236 486, 244 490" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
        <path d="M220 503 C218 494, 212 490, 205 490" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="3" stroke-linecap="round"/>

        <!-- mango -->
        <path d="M330 545 C355 520, 390 530, 396 565 C402 600, 372 618, 348 602 C326 587, 312 563, 330 545 Z" fill="#34D399" fill-opacity="0.9"/>
        <path d="M344 538 C354 528, 366 525, 376 528" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>

        <!-- orange -->
        <circle cx="450" cy="515" r="16" fill="#10B981" fill-opacity="0.85"/>
        <path d="M450 496 C456 488, 465 486, 473 489" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
      </g>

      <!-- Branded truck -->
      <g transform="translate(640 520)" filter="url(#accentGlow)">
        <!-- shadow -->
        <ellipse cx="190" cy="120" rx="210" ry="20" fill="#000000" fill-opacity="0.35"/>

        <!-- cargo -->
        <rect x="70" y="35" width="310" height="95" rx="16" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.18"/>
        <!-- cab -->
        <path d="M70 65 C70 45, 88 35, 106 35 L170 35 C190 35, 200 45, 200 65 L200 130 L70 130 Z" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.18"/>
        <!-- window -->
        <rect x="98" y="54" width="68" height="34" rx="10" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.12"/>

        <!-- green stripe -->
        <rect x="86" y="78" width="280" height="10" rx="5" fill="url(#glow)" opacity="0.95"/>

        <!-- brand text -->
        <text x="220" y="112" text-anchor="middle" class="t-title" font-size="26" fill="#FFFFFF">FreshRoute</text>

        <!-- wheels -->
        <g>
          <circle cx="140" cy="135" r="22" fill="#020617" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="3"/>
          <circle cx="140" cy="135" r="9" fill="#10B981" fill-opacity="0.9"/>

          <circle cx="320" cy="135" r="22" fill="#020617" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="3"/>
          <circle cx="320" cy="135" r="9" fill="#10B981" fill-opacity="0.9"/>
        </g>
      </g>

      <!-- Small badges -->
      <g opacity="0.95">
        <rect x="130" y="415" width="250" height="36" rx="18" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.30"/>
        <text x="255" y="439" text-anchor="middle" class="t-small" font-size="14" fill="#34D399">AI • BLOCKCHAIN • LOGISTICS</text>

        <rect x="400" y="415" width="260" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
        <text x="530" y="439" text-anchor="middle" class="t-small" font-size="14" fill="#CBD5E1">TRACEABILITY • QUALITY • TRUST</text>
      </g>
    </g>

    <!-- Hero text -->
    <text x="130" y="745" class="t-body" font-size="30" fill="#F8FAFC">From farm to market — fresher, smarter, and trusted.</text>
    <text x="130" y="790" class="t-body" font-size="20" fill="#CBD5E1">
      Demand Forecasting · Smart Contracts · Perishability-Aware Routing · AI Quality Verification
    </text>
  </g>

  <!-- Info grid -->
  <g>
    <!-- left column -->
    <rect x="90" y="880" width="500" height="240" rx="24" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="130" y="945" class="t-small" font-size="14" fill="#10B981">WHAT WE OFFER</text>
    <text x="130" y="995" class="t-body" font-size="22" fill="#F8FAFC">Marketplace + Traceability + Analytics</text>

    <circle cx="140" cy="1050" r="6" fill="#10B981"/>
    <text x="160" y="1057" class="t-body" font-size="18" fill="#E2E8F0">Transparent, auditable batch event history</text>

    <circle cx="140" cy="1090" r="6" fill="#10B981"/>
    <text x="160" y="1097" class="t-body" font-size="18" fill="#E2E8F0">Escrow-based payments and dispute reduction</text>

    <circle cx="140" cy="1130" r="6" fill="#10B981"/>
    <text x="160" y="1137" class="t-body" font-size="18" fill="#E2E8F0">AI insights for demand and quality verification</text>

    <!-- right column -->
    <rect x="610" y="880" width="500" height="240" rx="24" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="650" y="945" class="t-small" font-size="14" fill="#10B981">FOLLOW / CONTACT</text>

    <!-- social rows (icons are simple shapes to avoid external assets) -->
    <g opacity="0.95">
      <rect x="650" y="975" width="420" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <circle cx="675" cy="997" r="10" fill="#10B981" fill-opacity="0.95"/>
      <text x="700" y="1003" class="t-body" font-size="18" fill="#E2E8F0">Facebook: @freshroute</text>

      <rect x="650" y="1031" width="420" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <rect x="666" y="1043" width="18" height="18" rx="5" fill="#10B981" fill-opacity="0.95"/>
      <text x="700" y="1059" class="t-body" font-size="18" fill="#E2E8F0">Instagram: @freshroute</text>

      <rect x="650" y="1087" width="420" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <path d="M666 1107 H686 V1123 H666 Z" fill="#10B981" fill-opacity="0.95"/>
      <text x="700" y="1115" class="t-body" font-size="18" fill="#E2E8F0">Email: business@your-domain.com</text>
    </g>
  </g>

  <!-- FreshRoute Pro block -->
  <g filter="url(#softShadow)">
    <rect x="90" y="1160" width="1020" height="300" rx="28" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-opacity="0.35"/>
    <text x="130" y="1250" class="t-title" font-size="36" fill="#F8FAFC">FreshRoute Pro</text>
    <text x="130" y="1295" class="t-body" font-size="20" fill="#E2E8F0">Upcoming version with advanced analytics, automation, and enterprise onboarding.</text>

    <circle cx="140" cy="1355" r="6" fill="#34D399"/>
    <text x="160" y="1362" class="t-body" font-size="18" fill="#E2E8F0">Organization accounts + role-based onboarding</text>

    <circle cx="140" cy="1395" r="6" fill="#34D399"/>
    <text x="160" y="1402" class="t-body" font-size="18" fill="#E2E8F0">Automation for batch events and dispute workflows</text>

    <circle cx="140" cy="1435" r="6" fill="#34D399"/>
    <text x="160" y="1442" class="t-body" font-size="18" fill="#E2E8F0">Advanced dashboards and reporting for stakeholders</text>

    <!-- QR placeholder -->
    <rect x="930" y="1230" width="140" height="140" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="955" y="1255" width="24" height="24" rx="6" fill="#34D399" fill-opacity="0.85"/>
    <rect x="1019" y="1255" width="24" height="24" rx="6" fill="#34D399" fill-opacity="0.85"/>
    <rect x="955" y="1319" width="24" height="24" rx="6" fill="#34D399" fill-opacity="0.85"/>
    <rect x="1019" y="1319" width="24" height="24" rx="6" fill="#34D399" fill-opacity="0.85"/>
    <text x="1000" y="1395" text-anchor="middle" class="t-small" font-size="12" fill="#CBD5E1">SCAN</text>
  </g>

  <!-- Footer note -->
  <text x="90" y="1540" class="t-body" font-size="14" fill="#94A3B8">Poster asset for the FreshRoute research website — replace with your official design when ready.</text>
</svg>
